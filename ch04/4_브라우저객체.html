<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4_브라우저객체</title>
</head>
<body>
    <h3>4. 브라우저객체</h3>
    
    <h4>window</h4>
    <script>
        /*
            window
            - 브라우저 객체, 자바스크립트 최상위 객체
            - 생략 가능        
        */
       
        // window 객체 콘솔 확인
        console.log(window);
       
       // 브라우저 크기
        document.write('innerWidth : ' + window.innerWidth + '<br>');
        document.write('innerHeight : ' + innerHeight + '<br>');

        // 새 창 씌우기
        // window.open('./1_객체.html', '새창 테스트', 'width=600 height=500');

        // 브라우저 로컬 저장소, 해당 페이지에 저장한 데이터를 영구 저장
        localStorage.setItem('name', '김유신');

        // 브라우저 세션 저장소, 해당 페이지가 실행되는 동안 데이터를 저장
        sessionStorage.setItem('name', '김춘추');


    </script>

    
    <h4>navigator</h4>
    <script>
        /*
            navigator
            - 브라우저 정보 객체
        */
        console.log(navigator);

        // 브라우저 정보 출력
        document.write('브라우저 코드명: ' + navigator.appCodeName + '<br>');
        document.write('브라우저 이름: ' + navigator.appName + '<br>');
        document.write('브라우저 버전: ' + navigator.appVersion + '<br>');
        document.write('브라우저 플랫폼: ' + navigator.platform + '<br>');
        document.write('브라우저 정보: ' + navigator.userAgent + '<br>');

    </script>


    <h4>location</h4>

    <button onclick="btn1Click()">새로고침</button>
    <button onclick="btn2Click()">네이버</button>
    <button onclick="btn3Click()">구글</button>

    <script>
        /*
            location 
            - 브라우저 주소창 객체
        */
        // 페이지 새로 고침
        function btn1Click() {
            location.reload();
        }

        // 페이지 이동, 현재 페이지 주소 히스토리에 저장
        function btn2Click() {
            location.href = 'https://naver.com';
        }

        // 페이지 이동, 현재 페이지 주소 히스토리에 저장 안 됨
        function btn3Click() {
            location.replace('https://google.com');
        }

    </script>


    <h4>history</h4>

    <button onclick="btnBack()">뒤로</button> 
    <button onclick="btnForward()">앞으로</button> <br>

    <script>
        /*
            history 
            - 브라우저 주소 히스토리 객체
        */
        document.write('history 길이 : ' + history.length + '<br>');

        function btnBack() {
            // 브라우저 주소 이전으로 이동
            history.back();
        }

        function btnForward() {
            // 브라우저 주소 앞으로 이동
            history.forward();
        }

    </script>

</body>
</html>
